<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Vasuki Control Room</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>
*{box-sizing:border-box}body{margin:0;background:#08090d;color:#f3f0e8;font-family:Arial,sans-serif}button,input,textarea{font:inherit}.shell{display:grid;grid-template-columns:235px 1fr;min-height:100vh}.side{padding:25px 18px;border-right:1px solid #24262d;background:#0d0f14}.brand{color:#e0c379;font-weight:900;letter-spacing:2px;margin-bottom:35px}.side button{width:100%;border:0;border-radius:12px;background:transparent;color:#999;text-align:left;padding:13px;margin:3px 0}.side button.active{background:#1b1e25;color:#e0c379}.main{padding:35px;max-width:1350px;width:100%}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.top h1{margin:0}.pin{display:flex;gap:8px}.pin input,.field input,.field textarea{background:#11141a;border:1px solid #2c2f38;color:white;border-radius:11px;padding:11px}.pin button,.primary{border:0;border-radius:11px;padding:11px 15px;background:#d7b56d;color:#111;font-weight:800;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}.stat{padding:20px;border:1px solid #242832;border-radius:18px;background:#11141a}.stat b{display:block;font-size:28px;color:#e5c980}.panel{background:#11141a;border:1px solid #242832;border-radius:22px;padding:22px;margin-bottom:20px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:10px;color:#8f949f}.field.full{grid-column:1/-1}.table{display:grid;gap:9px}.row{display:grid;grid-template-columns:55px 1fr 100px 95px 110px;gap:12px;align-items:center;padding:10px;border-radius:14px;background:#171a21}.row img{width:50px;height:50px;object-fit:cover;border-radius:10px}.row small{color:#888}.actions{display:flex;gap:5px}.actions button{border:0;border-radius:8px;padding:8px;cursor:pointer}.edit{background:#293044;color:#aacaef}.delete{background:#442629;color:#ff9ca5}.updates{display:grid;gap:9px}.update{padding:14px;background:#171a21;border-radius:13px;display:flex;justify-content:space-between;gap:12px}.hidden{display:none!important}.toast{position:fixed;right:18px;bottom:18px;padding:12px 16px;border-radius:12px;background:#d7b56d;color:#111;font-weight:800;transform:translateY(100px);transition:.3s}.toast.show{transform:none}@media(max-width:800px){.shell{grid-template-columns:1fr}.side{display:flex;position:sticky;top:0;z-index:2;padding:10px;border-right:0;border-bottom:1px solid #24262d}.brand{margin:0 auto 0 5px;align-self:center}.side button{width:auto;font-size:0}.side button i{font-size:16px}.main{padding:18px}.top{align-items:flex-start;gap:15px}.pin{flex-wrap:wrap;justify-content:flex-end}.stats{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.field.full{grid-column:1}.row{grid-template-columns:45px 1fr 70px}.row .category{display:none}.actions{grid-column:2/4}.row img{width:42px;height:42px}}
</style></head><body><div class="shell"><aside class="side"><div class="brand">VASUKI</div><button class="active" data-tab="products"><i class="fas fa-box"></i> Products</button><button data-tab="updates"><i class="fas fa-bell"></i> Updates</button><button onclick="location.href='/'"><i class="fas fa-arrow-up-right-from-square"></i> Website</button></aside><main class="main"><div class="top"><div><small>OWNER & TEAM</small><h1>Control Room</h1></div><div class="pin"><input id="pin" type="password" inputmode="numeric" placeholder="Admin PIN"><button id="unlock">Unlock</button></div></div><div class="stats"><div class="stat"><small>Products</small><b id="productCount">—</b></div><div class="stat"><small>Active</small><b id="activeCount">—</b></div><div class="stat"><small>Updates</small><b id="updateCount">—</b></div></div><section id="productsTab"><div class="panel"><div class="panel-head"><h2 id="formTitle">Add Product</h2><button class="primary" id="reset">New Product</button></div><form id="productForm" class="grid"><input id="editingSlug" type="hidden"><div class="field"><label>Product Name</label><input id="name" required></div><div class="field"><label>Unique URL Slug</label><input id="slug" placeholder="premium-nfc-card"></div><div class="field"><label>Price ₹</label><input id="price" type="number" min="0" required></div><div class="field"><label>Old Price ₹</label><input id="oldPrice" type="number" min="0"></div><div class="field"><label>Category</label><input id="category" placeholder="nfc"></div><div class="field"><label>Badge</label><input id="badge" placeholder="Most Popular"></div><div class="field full"><label>Image URL</label><input id="image" placeholder="/assets/product-image.png"></div><div class="field full"><label>Short Description</label><textarea id="short" rows="3" required></textarea></div><div class="field full"><label>Features (comma separated)</label><input id="features" placeholder="NFC + QR, Custom design, Digital profile"></div><div><button class="primary" type="submit">Save Product</button></div></form></div><div class="panel"><div class="panel-head"><h2>Product Catalogue</h2><button class="primary" id="refresh">Refresh</button></div><div class="table" id="productList"><p>Enter PIN and unlock.</p></div></div></section><section id="updatesTab" class="hidden"><div class="panel"><h2>Add Website Update</h2><form id="updateForm" class="grid"><div class="field"><label>Title</label><input id="updateTitle" required></div><div class="field full"><label>Message</label><textarea id="updateText" rows="3" required></textarea></div><div><button class="primary">Publish Update</button></div></form></div><div class="panel"><h2>Published Updates</h2><div class="updates" id="updateList"></div></div></section></main></div><div class="toast" id="toast"></div><script>
let catalog={products:[],updates:[]};const $=id=>document.getElementById(id);const headers=()=>({'Content-Type':'application/json','x-admin-pin':$('pin').value});function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)}async function load(){const r=await fetch('/api/admin/catalog',{headers:headers()});const d=await r.json();if(!r.ok)throw Error(d.error||'Unable to unlock');catalog=d;render()}function render(){$('productCount').textContent=catalog.products.length;$('activeCount').textContent=catalog.products.filter(x=>x.active!==false).length;$('updateCount').textContent=catalog.updates.length;$('productList').innerHTML=catalog.products.map(p=>`<div class="row"><img src="${p.image}" alt=""><div><b>${p.name}</b><br><small>/product/${p.slug}</small></div><b>₹${p.price}</b><small class="category">${p.category}</small><div class="actions"><button class="edit" onclick="editProduct('${p.slug}')"><i class="fas fa-pen"></i></button><button class="delete" onclick="removeProduct('${p.slug}')"><i class="fas fa-eye-slash"></i></button></div></div>`).join('')||'<p>No products</p>';$('updateList').innerHTML=catalog.updates.map(u=>`<div class="update"><div><b>${u.title}</b><br><small>${u.text}</small></div><button class="delete" onclick="removeUpdate('${u.id}')"><i class="fas fa-trash"></i></button></div>`).join('')||'<p>No updates yet.</p>'}function resetForm(){$('productForm').reset();$('editingSlug').value='';$('formTitle').textContent='Add Product'}function editProduct(slug){const p=catalog.products.find(x=>x.slug===slug);if(!p)return;['name','slug','price','oldPrice','category','badge','image','short'].forEach(k=>$(k).value=p[k]??'');$('features').value=(p.features||[]).join(', ');$('editingSlug').value=p.slug;$('formTitle').textContent='Edit Product';scrollTo({top:0,behavior:'smooth'})}async function removeProduct(slug){if(!confirm('Temporarily hide this product?'))return;const r=await fetch('/api/admin/products/'+slug,{method:'DELETE',headers:headers()});if(!r.ok)return toast('Unable to hide');await load();toast('Product hidden')}async function removeUpdate(id){await fetch('/api/admin/updates/'+id,{method:'DELETE',headers:headers()});await load();toast('Update removed')}$('unlock').onclick=()=>load().then(()=>toast('Panel unlocked')).catch(e=>toast(e.message));$('refresh').onclick=()=>load().catch(e=>toast(e.message));$('reset').onclick=resetForm;$('productForm').onsubmit=async e=>{e.preventDefault();const old=$('editingSlug').value;const body={};['name','slug','price','oldPrice','category','badge','image','short'].forEach(k=>body[k]=$(k).value);body.features=$('features').value;const r=await fetch(old?'/api/admin/products/'+old:'/api/admin/products',{method:old?'PUT':'POST',headers:headers(),body:JSON.stringify(body)});const d=await r.json();if(!r.ok)return toast(d.error||'Save failed');resetForm();await load();toast('Product saved')};$('updateForm').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/admin/updates',{method:'POST',headers:headers(),body:JSON.stringify({title:$('updateTitle').value,text:$('updateText').value})});const d=await r.json();if(!r.ok)return toast(d.error||'Failed');e.target.reset();await load();toast('Update published')};document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));$('productsTab').classList.toggle('hidden',b.dataset.tab!=='products');$('updatesTab').classList.toggle('hidden',b.dataset.tab!=='updates')});
</script></body></html>
